[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:octane]
command=php artisan octane:start --server=swoole --host=0.0.0.0 --port=9000 --workers=4 --max-requests=100
directory=/var/www/html
autostart=true
autorestart=true
stdout_logfile=/var/log/octane.log
stderr_logfile=/var/log/octane-error.log
user=www-data